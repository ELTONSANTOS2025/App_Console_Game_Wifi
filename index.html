<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Game Controller</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
touch-action:manipulation;
}

body{
background:#111;
color:white;
overflow:hidden;
}

.screen{
display:none;
width:100vw;
height:100vh;
}

.active{
display:flex;
}

#menu{
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

button{
border:none;
background:#00b894;
color:white;
padding:16px 28px;
border-radius:14px;
font-size:18px;
}

#hostScreen{
flex-direction:column;
padding:20px;
overflow:auto;
}

#hostTop{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

#qrcode{
background:white;
padding:10px;
border-radius:14px;
}

#players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.playerCard{
background:#1e1e1e;
padding:20px;
border-radius:14px;
border:2px solid #333;
}

.connected{
border-color:#00b894;
}

#gameArea{
flex:1;
margin-top:20px;
background:black;
border-radius:16px;
position:relative;
overflow:hidden;
min-height:400px;
}

#ball{
width:50px;
height:50px;
background:#00b894;
border-radius:50%;
position:absolute;
left:100px;
top:100px;
}

#controllerScreen{
flex-direction:column;
justify-content:space-between;
padding:10px;
}

.controllerArea{
flex:1;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

.dpad{
position:relative;
width:220px;
height:220px;
}

.dpad button{
position:absolute;
width:70px;
height:70px;
background:#333;
border-radius:16px;
font-size:24px;
}

.up{top:0;left:75px;}
.down{bottom:0;left:75px;}
.left{left:0;top:75px;}
.right{right:0;top:75px;}

.actionButtons{
display:grid;
grid-template-columns:repeat(2,90px);
gap:20px;
}

.actionButtons button{
width:90px;
height:90px;
border-radius:50%;
background:#444;
font-size:28px;
}

.bottomButtons{
display:flex;
justify-content:center;
gap:20px;
padding-bottom:20px;
}

.smallBtn{
width:120px;
background:#555;
}

.pressed{
transform:scale(0.95);
background:#00d1a0 !important;
}

</style>
</head>
<body>

<div id="menu" class="screen active">

<h1>🎮 WiFi Game Controller</h1>

<button id="hostBtn">Criar Console TV</button>

<button id="joinBtn">Entrar como Controle</button>

</div>

<div id="hostScreen" class="screen">

<div id="hostTop">

<div>
<h2>Console Principal</h2>
<p>ID da Sala:</p>
<h1 id="roomId"></h1>
</div>

<div id="qrcode"></div>

</div>

<div id="players"></div>

<div id="gameArea">
<div id="ball"></div>
</div>

</div>

<div id="controllerScreen" class="screen">

<h2 id="status">Conectando...</h2>

<div class="controllerArea">

<div class="dpad">
<button class="up" data-key="UP">⬆</button>
<button class="down" data-key="DOWN">⬇</button>
<button class="left" data-key="LEFT">⬅</button>
<button class="right" data-key="RIGHT">➡</button>
</div>

<div class="actionButtons">
<button data-key="Y">Y</button>
<button data-key="X">X</button>
<button data-key="B">B</button>
<button data-key="A">A</button>
</div>

</div>

<div class="bottomButtons">
<button class="smallBtn" data-key="START">START</button>
<button class="smallBtn" data-key="SELECT">SELECT</button>
</div>

</div>

<script>

const SERVER_URL = window.location.origin;

const socket = io(SERVER_URL);

const screens = {
menu: document.getElementById('menu'),
host: document.getElementById('hostScreen'),
controller: document.getElementById('controllerScreen')
};

function showScreen(name){
Object.values(screens).forEach(s=>s.classList.remove('active'));
screens[name].classList.add('active');
}

const players = {};

let roomId = null;

document.getElementById('hostBtn').onclick = () => {

roomId = Math.random().toString(36).substring(2,8).toUpperCase();

showScreen('host');

document.getElementById('roomId').innerText = roomId;

socket.emit('create-room', roomId);

const url = window.location.href.split('?')[0] + '?room=' + roomId;

QRCode.toCanvas(document.createElement('canvas'), url, { width:200 }, (err,canvas)=>{

document.getElementById('qrcode').innerHTML='';

document.getElementById('qrcode').appendChild(canvas);

});

};

document.getElementById('joinBtn').onclick = joinRoom;

function joinRoom(){

roomId = new URLSearchParams(location.search).get('room');

if(!roomId){
roomId = prompt('Digite o ID da sala');
}

if(!roomId)return;

showScreen('controller');

socket.emit('join-room', roomId);

}

socket.on('joined', data => {

document.getElementById('status').innerText =
'Jogador ' + data.playerId + ' conectado';

});

socket.on('players-update', data => {

Object.assign(players, data.players);

renderPlayers();

});

function renderPlayers(){

const container = document.getElementById('players');

container.innerHTML='';

for(let i=1;i<=4;i++){

const p = players[i];

const div = document.createElement('div');

div.className = 'playerCard ' + (p ? 'connected':'');

div.innerHTML = `
<h3>Jogador ${i}</h3>
<p>${p ? 'Conectado':'Aguardando...'}</p>
`;

container.appendChild(div);

}

}

const ball = document.getElementById('ball');

let x = 100;
let y = 100;

socket.on('controller-input', data => {

const speed = 15;

switch(data.key){

case 'UP':
y -= speed;
break;

case 'DOWN':
y += speed;
break;

case 'LEFT':
x -= speed;
break;

case 'RIGHT':
x += speed;
break;

}

ball.style.left = x + 'px';
ball.style.top = y + 'px';

});

function setupButtons(){

document.querySelectorAll('[data-key]').forEach(btn=>{

const key = btn.dataset.key;

const press = state => {

btn.classList.toggle('pressed', state);

if(state){

socket.emit('controller-input',{
roomId,
key
});

}

};

btn.addEventListener('touchstart',e=>{
e.preventDefault();
press(true);
},{passive:false});

btn.addEventListener('touchend',e=>{
e.preventDefault();
press(false);
},{passive:false});

btn.addEventListener('mousedown',()=>press(true));
btn.addEventListener('mouseup',()=>press(false));

});

}

setupButtons();

const autoRoom = new URLSearchParams(location.search).get('room');

if(autoRoom){

setTimeout(joinRoom,500);

}

</script>

</body>
</html>
