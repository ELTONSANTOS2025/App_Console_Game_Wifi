<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WiFi Game Controller - PS3 Layout</title>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      touch-action: manipulation;
      user-select: none;
    }

    body {
      background: #111;
      color: white;
      overflow: hidden;
    }

    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
    }

    .active {
      display: flex;
    }

    #menu {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      text-align: center;
    }

    button {
      background: #00b894;
      border: none;
      color: white;
      padding: 16px 28px;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      width: 260px;
      max-width: 90vw;
    }

    button:hover {
      background: #00d1a0;
    }

    #hostScreen {
      flex-direction: column;
      padding: 20px;
      overflow: auto;
    }

    #hostTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 20px;
    }

    #qrcode {
      background: white;
      padding: 12px;
      border-radius: 12px;
      width: fit-content;
    }

    #players {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .playerCard {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 20px;
      border: 2px solid #333;
    }

    .connected {
      border-color: #00b894;
    }

    .playerTitle {
      font-size: 1.2rem;
      margin-bottom: 12px;
    }

    .inputList {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 15px;
    }

    /* ---------- TELA DE CONTROLE (PS3 LAYOUT) ---------- */
    #controllerScreen {
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
    }

    .topInfo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 16px;
    }

    .controllerArea {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      flex: 1;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    /* Left side: D-Pad + Joystick */
    .leftControls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      flex: 1;
      min-width: 180px;
    }

    /* D-Pad */
    .dpad {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto;
    }

    .dpad button {
      position: absolute;
      width: 65px;
      height: 65px;
      border-radius: 16px;
      background: #2c2c2c;
      font-size: 28px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .dpad .up { top: 0; left: 67.5px; }
    .dpad .down { bottom: 0; left: 67.5px; }
    .dpad .left { left: 0; top: 67.5px; }
    .dpad .right { right: 0; top: 67.5px; }

    /* Left Joystick (canvas) */
    .joystickContainer {
      text-align: center;
    }

    .joystickLabel {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 8px;
    }

    canvas.joystickCanvas {
      background: #2c2c2c;
      border-radius: 50%;
      box-shadow: 0 0 0 4px #1f1f1f, 0 8px 20px rgba(0,0,0,0.5);
      width: 150px;
      height: 150px;
      touch-action: none;
    }

    /* Right side: Action Buttons (PS3 style) */
    .rightControls {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex: 1;
      min-width: 200px;
    }

    .actionButtons {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 10px;
      place-items: center;
      margin-bottom: 30px;
    }

    .actionButtons button {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      font-size: 28px;
      font-weight: bold;
      background: #3a3a3a;
      border: none;
      box-shadow: 0 6px 0 #1a1a1a;
      transition: all 0.05s linear;
    }

    /* Posicionamento dos botões no estilo PS */
    .btn-triangle { grid-column: 2 / 3; grid-row: 1 / 2; background: #4c9f70; color: white; }
    .btn-square  { grid-column: 1 / 2; grid-row: 2 / 3; background: #8b5a8b; color: white; }
    .btn-circle  { grid-column: 3 / 4; grid-row: 2 / 3; background: #c94f4f; color: white; }
    .btn-cross   { grid-column: 2 / 3; grid-row: 3 / 4; background: #4f8bc9; color: white; }

    .actionButtons button.pressed {
      transform: scale(0.9);
      box-shadow: 0 2px 0 #1a1a1a;
    }

    /* Botões inferiores (Select, PS, Start) */
    .bottomButtons {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-top: 10px;
    }

    .sysBtn {
      width: 90px;
      background: #2c2c2c;
      border-radius: 30px;
      font-size: 16px;
      padding: 12px;
    }

    .psBtn {
      background: #1f1f2f;
      color: #ccc;
      font-size: 20px;
      letter-spacing: 2px;
    }

    .pressed {
      background: #00b894 !important;
      transform: scale(0.95);
    }

    #gameArea {
      margin-top: 20px;
      flex: 1;
      background: #000;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      min-height: 300px;
    }

    #ball {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #00b894;
      position: absolute;
      left: 100px;
      top: 100px;
      transition: left 0.03s, top 0.03s;
    }

    .instructions {
      margin-top: 15px;
      color: #aaa;
      line-height: 1.5;
      font-size: 12px;
    }

    @media (max-width: 700px) {
      .controllerArea {
        flex-direction: column;
        align-items: center;
      }
      .actionButtons {
        grid-template-columns: repeat(3, 70px);
        grid-template-rows: repeat(3, 70px);
      }
      .actionButtons button {
        width: 60px;
        height: 60px;
        font-size: 24px;
      }
      .dpad {
        width: 160px;
        height: 160px;
      }
      .dpad button {
        width: 50px;
        height: 50px;
        font-size: 24px;
      }
      .dpad .up, .dpad .down { left: 55px; }
      .dpad .left, .dpad .right { top: 55px; }
    }
  </style>
</head>
<body>

  <div id="menu" class="screen active">
    <h1>🎮 PS3 WiFi Controller</h1>
    <p>Transforme celulares em controles sem fio</p>
    <button id="hostBtn">Criar Console (TV)</button>
    <button id="joinBtn">Entrar como Controle</button>
  </div>

  <div id="hostScreen" class="screen">
    <div id="hostTop">
      <div>
        <h2>Console Principal</h2>
        <p>ID da sala:</p>
        <h1 id="roomId"></h1>
        <div class="instructions">
          <p>1. Abra na TV / PC (host)</p>
          <p>2. Celulares na mesma rede WiFi</p>
          <p>3. Escaneie o QRCode</p>
          <p>4. Use D-Pad, Joystick e botões PS3</p>
        </div>
      </div>
      <div id="qrcode"></div>
    </div>
    <div id="players"></div>
    <div id="gameArea">
      <div id="ball"></div>
    </div>
  </div>

  <div id="controllerScreen" class="screen">
    <div class="topInfo">
      <div>
        <h2>🎮 Controle PS3</h2>
        <p id="controllerStatus">Conectando...</p>
      </div>
    </div>

    <div class="controllerArea">
      <!-- Lado Esquerdo: D-Pad + Joystick -->
      <div class="leftControls">
        <div class="dpad">
          <button class="up" data-key="UP">▲</button>
          <button class="down" data-key="DOWN">▼</button>
          <button class="left" data-key="LEFT">◀</button>
          <button class="right" data-key="RIGHT">▶</button>
        </div>
        <div class="joystickContainer">
          <div class="joystickLabel">Left Joystick</div>
          <canvas id="leftJoystickCanvas" class="joystickCanvas" width="200" height="200"></canvas>
        </div>
      </div>

      <!-- Lado Direito: Botões Ação PS3 -->
      <div class="rightControls">
        <div class="actionButtons">
          <button class="btn-triangle" data-key="TRIANGLE">▲</button>
          <button class="btn-square"  data-key="SQUARE">◼</button>
          <button class="btn-circle"  data-key="CIRCLE">●</button>
          <button class="btn-cross"   data-key="CROSS">✕</button>
        </div>
        <div class="bottomButtons">
          <button class="sysBtn" data-key="SELECT">SELECT</button>
          <button class="sysBtn psBtn" data-key="PS">PS</button>
          <button class="sysBtn" data-key="START">START</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const screens = {
        menu: document.getElementById('menu'),
        host: document.getElementById('hostScreen'),
        controller: document.getElementById('controllerScreen')
      };

      const hostBtn = document.getElementById('hostBtn');
      const joinBtn = document.getElementById('joinBtn');

      let peer;
      let connections = [];
      let myConnection = null;
      let isHost = false;
      let joystickActive = false;
      let joystickInterval = null;
      let currentJoyDir = { up: false, down: false, left: false, right: false };

      const MAX_PLAYERS = 4;

      let ball = document.getElementById('ball');
      let ballX = 100, ballY = 100;

      function showScreen(name) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[name].classList.add('active');
      }

      function updateBall() {
        if (!ball) return;
        const gameArea = document.getElementById('gameArea');
        if (!gameArea) return;
        const maxX = Math.max(0, gameArea.clientWidth - 50);
        const maxY = Math.max(0, gameArea.clientHeight - 50);
        ballX = Math.max(0, Math.min(maxX, ballX));
        ballY = Math.max(0, Math.min(maxY, ballY));
        ball.style.left = ballX + 'px';
        ball.style.top = ballY + 'px';
      }

      window.addEventListener('resize', () => updateBall());

      function renderPlayers() {
        const container = document.getElementById('players');
        if (!container) return;
        container.innerHTML = '';
        for (let i = 1; i <= MAX_PLAYERS; i++) {
          const player = connections.find(p => p.id === i);
          const card = document.createElement('div');
          card.className = 'playerCard ' + (player ? 'connected' : '');
          card.innerHTML = `
            <div class="playerTitle">Jogador ${i} ${player ? '🟢' : '⚫'}</div>
            <div class="inputList">
              ${player && player.inputs ? Object.entries(player.inputs).map(([k,v]) => `${k}: ${v}`).join('<br>') : 'Aguardando...'}
            </div>
          `;
          container.appendChild(card);
        }
      }

      function handleControllerData(player, data) {
        if (data.type === 'INPUT') {
          if (!player.inputs) player.inputs = {};
          player.inputs[data.key] = data.state ? 'ON' : 'OFF';
          renderPlayers();

          const speed = 15;
          if (data.state && (data.key === 'UP' || data.key === 'DOWN' || data.key === 'LEFT' || data.key === 'RIGHT')) {
            switch(data.key) {
              case 'UP': ballY -= speed; break;
              case 'DOWN': ballY += speed; break;
              case 'LEFT': ballX -= speed; break;
              case 'RIGHT': ballX += speed; break;
            }
            updateBall();
          }
        }
      }

      function createHost() {
        isHost = true;
        showScreen('host');
        const room = 'room-' + Math.random().toString(36).substring(2, 12);
        peer = new Peer(room);
        document.getElementById('roomId').textContent = room;
        const url = window.location.href.split('?')[0] + '?room=' + room;
        const qrcodeDiv = document.getElementById('qrcode');
        qrcodeDiv.innerHTML = '';
        const canvas = document.createElement('canvas');
        qrcodeDiv.appendChild(canvas);
        QRCode.toCanvas(canvas, url, { width: 200 }, err => { if (err) console.error(err); });
        renderPlayers();

        peer.on('connection', conn => {
          if (connections.length >= MAX_PLAYERS) { conn.send({ type: 'FULL' }); conn.close(); return; }
          const playerId = connections.length + 1;
          const player = { id: playerId, conn, inputs: {} };
          connections.push(player);
          renderPlayers();
          conn.on('open', () => conn.send({ type: 'CONNECTED', playerId }));
          conn.on('data', data => handleControllerData(player, data));
          conn.on('close', () => { connections = connections.filter(p => p !== player); renderPlayers(); });
        });
        peer.on('error', err => console.error(err));
      }

      // ----- JOYSTICK ANALÓGICO (Left Joystick) -----
      function setupJoystick() {
        const canvas = document.getElementById('leftJoystickCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let centerX = 100, centerY = 100;
        let radius = 70;
        let thumbRadius = 25;
        let dragging = false;
        let dragX = centerX, dragY = centerY;

        function drawJoystick(x, y) {
          ctx.clearRect(0, 0, 200, 200);
          ctx.beginPath();
          ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
          ctx.fillStyle = '#3a3a3a';
          ctx.fill();
          ctx.strokeStyle = '#555';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(x, y, thumbRadius, 0, 2 * Math.PI);
          ctx.fillStyle = '#00b894';
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        function getDirectionFromPosition(deltaX, deltaY) {
          const deadzone = 15;
          const absX = Math.abs(deltaX);
          const absY = Math.abs(deltaY);
          if (absX < deadzone && absY < deadzone) return { up: false, down: false, left: false, right: false };
          let up = false, down = false, left = false, right = false;
          if (absY > absX) {
            if (deltaY < 0) up = true;
            else down = true;
          } else {
            if (deltaX < 0) left = true;
            else right = true;
          }
          return { up, down, left, right };
        }

        function sendJoystickState(state) {
          ['UP', 'DOWN', 'LEFT', 'RIGHT'].forEach(dir => {
            const key = dir;
            const newState = state[key.toLowerCase()];
            if (currentJoyDir[key.toLowerCase()] !== newState) {
              currentJoyDir[key.toLowerCase()] = newState;
              if (myConnection && myConnection.open) {
                myConnection.send({ type: 'INPUT', key, state: newState });
              }
            }
          });
        }

        function updateJoystick(clientX, clientY) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;
          let rawX = (clientX - rect.left) * scaleX;
          let rawY = (clientY - rect.top) * scaleY;
          let dx = rawX - centerX;
          let dy = rawY - centerY;
          const distance = Math.hypot(dx, dy);
          if (distance > radius) {
            dx = dx * (radius / distance);
            dy = dy * (radius / distance);
            rawX = centerX + dx;
            rawY = centerY + dy;
          }
          dragX = rawX;
          dragY = rawY;
          drawJoystick(dragX, dragY);
          const dir = getDirectionFromPosition(dx, dy);
          sendJoystickState(dir);
        }

        function stopJoystick() {
          dragging = false;
          dragX = centerX;
          dragY = centerY;
          drawJoystick(centerX, centerY);
          sendJoystickState({ up: false, down: false, left: false, right: false });
        }

        canvas.addEventListener('touchstart', (e) => {
          e.preventDefault();
          dragging = true;
          const touch = e.touches[0];
          updateJoystick(touch.clientX, touch.clientY);
        });
        canvas.addEventListener('touchmove', (e) => {
          e.preventDefault();
          if (!dragging) return;
          const touch = e.touches[0];
          updateJoystick(touch.clientX, touch.clientY);
        });
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); stopJoystick(); });
        canvas.addEventListener('touchcancel', (e) => { e.preventDefault(); stopJoystick(); });
        canvas.addEventListener('mousedown', (e) => {
          e.preventDefault();
          dragging = true;
          updateJoystick(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => {
          if (!dragging) return;
          updateJoystick(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => { if (dragging) stopJoystick(); });
        drawJoystick(centerX, centerY);
      }

      // Configuração dos botões (com suporte multi-toque)
      function setupButtons() {
        const buttons = document.querySelectorAll('[data-key]');
        const press = (btn, key, state) => {
          btn.classList.toggle('pressed', state);
          if (myConnection && myConnection.open) {
            myConnection.send({ type: 'INPUT', key, state });
          }
        };
        buttons.forEach(btn => {
          const key = btn.dataset.key;
          const handlePress = (state) => (e) => {
            if (e) e.preventDefault();
            press(btn, key, state);
          };
          btn.addEventListener('touchstart', handlePress(true), { passive: false });
          btn.addEventListener('touchend', handlePress(false));
          btn.addEventListener('touchcancel', handlePress(false));
          btn.addEventListener('mousedown', handlePress(true));
          btn.addEventListener('mouseup', handlePress(false));
          btn.addEventListener('mouseleave', handlePress(false));
          btn.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const elem = document.elementFromPoint(touch.clientX, touch.clientY);
            if (!btn.contains(elem)) handlePress(false)(e);
          });
        });
      }

      function joinAsController() {
        let roomId = new URLSearchParams(window.location.search).get('room');
        if (!roomId) roomId = prompt('Digite o ID da sala:');
        if (!roomId) { showScreen('menu'); return; }
        showScreen('controller');
        peer = new Peer();
        peer.on('open', () => {
          myConnection = peer.connect(roomId);
          if (!myConnection) { document.getElementById('controllerStatus').textContent = 'Falha'; return; }
          myConnection.on('open', () => {
            document.getElementById('controllerStatus').textContent = '✅ Conectado!';
            setupButtons();
            setupJoystick();   // Inicializa o joystick após conectar
          });
          myConnection.on('data', data => { if (data.type === 'FULL') { alert('Sala cheia!'); location.reload(); } });
          myConnection.on('close', () => { document.getElementById('controllerStatus').textContent = '❌ Desconectado'; setTimeout(() => showScreen('menu'), 1500); });
          myConnection.on('error', () => { document.getElementById('controllerStatus').textContent = '❌ Erro'; });
        });
        peer.on('error', () => { document.getElementById('controllerStatus').textContent = '❌ Erro Peer'; });
      }

      hostBtn.onclick = createHost;
      joinBtn.onclick = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('room')) joinAsController();
        else { let room = prompt('ID da sala:'); if (room) window.location.href = window.location.href.split('?')[0] + '?room=' + room; }
      };

      const params = new URLSearchParams(window.location.search);
      if (params.get('room')) setTimeout(() => { if (!isHost) joinAsController(); }, 100);

      setInterval(() => updateBall(), 50);
    });
  </script>
</body>
</html>
